<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VNDR Operations Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2230;
    --border: #2a3441;
    --accent: #f0a500;
    --accent2: #1f6feb;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    background: #263566;   /* VINDAR approved royal indigo blue */
    padding: 6px 9px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo img {
    height: 22px;
    display: block;
  }

  .header-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .header-sub {
    font-size: 11px;
    color: var(--text2);
    margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .last-update {
    font-size: 11px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }

  .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* TABS */
  .tabs {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 0;
  }

  .tab {
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* MAIN */
  .main {
    padding: 20px 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    margin-top: 20px;
  }

  .section-header:first-child { margin-top: 0; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* KPI GRID */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    transition: border-color 0.2s;
  }

  .kpi-card:hover { border-color: var(--accent2); }

  .kpi-label {
    font-size: 11px;
    color: var(--text3);
    font-weight: 500;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .kpi-value {
    font-size: 24px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .kpi-value.green { color: var(--green); }
  .kpi-value.yellow { color: var(--yellow); }
  .kpi-value.red { color: var(--red); }
  .kpi-value.accent { color: var(--accent); }
  .kpi-value.blue { color: var(--accent2); }

  .kpi-sub {
    font-size: 11px;
    color: var(--text3);
  }

  /* TWO COLUMNS */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  @media (max-width: 900px) {
    .two-col { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .card-header {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
  }

  .card-body { padding: 14px 16px; }

  /* DRIVER TABLE */
  .driver-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .driver-table th {
    text-align: left;
    padding: 8px 10px;
    color: var(--text3);
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .driver-table td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }

  .driver-table tr:last-child td { border-bottom: none; }

  .driver-table tr:hover td { background: var(--surface2); }

  .driver-name {
    font-weight: 500;
    max-width: 230px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }

  .badge-green { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-red { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-blue { background: rgba(31,111,235,0.15); color: var(--accent2); }
  .badge-gray { background: rgba(139,148,158,0.15); color: var(--text2); }
  .badge-accent { background: rgba(240,165,0,0.15); color: var(--accent); }

  .mono { font-family: 'JetBrains Mono', monospace; }

  /* BATCH BAR */
  .batch-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }

  .batch-row:last-child { border-bottom: none; }

  .batch-label {
    font-size: 11px;
    color: var(--text2);
    font-weight: 600;
    width: 56px;
    font-family: 'JetBrains Mono', monospace;
  }

  .batch-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .batch-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--accent2);
    transition: width 0.6s ease;
  }

  .batch-count {
    font-size: 11px;
    color: var(--text3);
    width: 20px;
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
  }

  .batch-names {
    font-size: 10px;
    color: var(--text3);
    flex: 1.5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ABSENCE */
  .absence-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .absence-item:last-child { border-bottom: none; }

  .absence-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }

  .absence-name {
    font-weight: 500;
    font-size: 12px;
    flex: 1;
  }

  .absence-reason {
    font-size: 11px;
    color: var(--text3);
  }

  /* MONTHLY TABLE */
  .monthly-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .monthly-table th {
    text-align: center;
    padding: 9px 8px;
    color: var(--text3);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .monthly-table th:first-child { text-align: left; }

  .monthly-table td {
    padding: 9px 8px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    color: var(--text);
  }

  .monthly-table td:first-child { text-align: left; }
  .monthly-table tr:last-child td { border-bottom: none; }
  .monthly-table tr:hover td { background: var(--surface2); }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 40px;
    color: var(--text2);
    font-size: 13px;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ERROR */
  .error-box {
    background: rgba(248,81,73,0.08);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 8px;
    padding: 16px;
    color: var(--red);
    font-size: 12px;
    margin: 12px 0;
  }

  /* PANEL */
  .panel { display: none; }
  .panel.active { display: block; }

  /* PERF NOTE */
  .perf-note {
    background: rgba(31,111,235,0.08);
    border: 1px solid rgba(31,111,235,0.2);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text2);
    margin-top: 12px;
    font-style: italic;
  }

  /* MONTH SELECTOR */
  .month-selector {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .month-btn {
    padding: 5px 12px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }

  .month-btn:hover { border-color: var(--accent); color: var(--accent); }
  .month-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* RANKING */
  .rank-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .rank-item:last-child { border-bottom: none; }

  .rank-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    width: 18px;
    font-family: 'JetBrains Mono', monospace;
  }

  .rank-num.gold { color: #f0a500; }
  .rank-num.silver { color: #8b949e; }
  .rank-num.bronze { color: #a0522d; }

  .rank-name { flex: 1; font-weight: 500; font-size: 12px; }
  .rank-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--accent); }
</style>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const API_KEY   = 'AIzaSyCl766yKMjS_rR8VQzxMXWlVT-Zn_Qt4Tk';
const SHEET_ID  = '11EJoOGo1UC-fQAH3uajDhcar_jCkbf9dMYv6OfDx60Y';
const BASE_URL  = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;

// ── STATE ────────────────────────────────────────────────────────────────────
let allSheets   = [];
let allData     = {};   // { sheetName: [ {date, batch, orders, hours, ...} ] }
let selectedMonth = null;
let selectedDailyDate = null;   // 'YYYY-MM-DD' chosen in the Daily tab; null = yesterday

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ── FETCH SHEET LIST ─────────────────────────────────────────────────────────
async function fetchSheetNames() {
  const r = await fetch(`${BASE_URL}?key=${API_KEY}&fields=sheets.properties.title`);
  if (!r.ok) throw new Error(`API error ${r.status}: ${r.statusText}`);
  const d = await r.json();
  return d.sheets.map(s => s.properties.title);
}

// ── FETCH ONE SHEET ──────────────────────────────────────────────────────────
async function fetchSheet(name) {
  const enc = encodeURIComponent(name);
  const r   = await fetch(`${BASE_URL}/values/${enc}?key=${API_KEY}&majorDimension=ROWS`);
  if (!r.ok) return [];
  const d   = await r.json();
  return d.values || [];
}

// ── PARSE DATE ───────────────────────────────────────────────────────────────
// Returns BOTH interpretations (as-written and day/month swapped) so the
// caller can pick the one that keeps dates chronological. Google randomly
// swaps day/month in this file; swaps can jump FORWARD (e.g. 07 Jul stored
// as 2026-12-07 = Dec) as well as backward, so both must be checked.
function parseDateCandidates(raw) {
  if (!raw || typeof raw !== 'string') return [];
  raw = raw.trim();
  let m = raw.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})$/);
  if (m) {
    let [, d, mo, y] = m;
    if (y.length === 2) y = '20' + y;
    const out = [new Date(+y, +mo - 1, +d)];
    if (+d <= 12 && +d !== +mo) out.push(new Date(+y, +d - 1, +mo));
    return out;
  }
  m = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) {
    const [, y, mo, d] = m;
    const out = [new Date(+y, +mo - 1, +d)];
    if (+d <= 12 && +d !== +mo) out.push(new Date(+y, +d - 1, +mo));
    return out;
  }
  return [];
}

// ── PARSE HOURS ──────────────────────────────────────────────────────────────
function parseHours(raw) {
  if (raw == null || raw === '') return null;
  const s = String(raw).trim().replace(',', '.');
  // Time object e.g. "14:00:00" or "14:30"
  let m = s.match(/^(\d{1,2}):(\d{2})/);
  if (m) {
    const v = +m[1] + (+m[2]) / 60;
    return v > 20 ? null : v;
  }
  // h.mm convention: exactly two decimal digits < 60 are MINUTES (14.30 = 14h30m)
  m = s.match(/^(\d{1,2})\.(\d{2})$/);
  if (m && +m[2] < 60) {
    const v = +m[1] + (+m[2]) / 60;
    return v > 20 ? null : v;
  }
  const v = parseFloat(s);
  if (isNaN(v)) return null;
  if (v > 20) return null;            // invalid
  if (v < 1 && v > 0) return v * 24;  // Excel fraction
  return v;
}

// ── PARSE SINGLE DRIVER SHEET ────────────────────────────────────────────────
function parseDriverSheet(rows) {
  // Find header row (contains "Date" or "date")
  let headerIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    if (rows[i].some(c => /^date/i.test(String(c).trim()))) {
      headerIdx = i; break;
    }
  }
  if (headerIdx === -1) return { name: '', id: '', rows: [] };

  // Driver name & ID from rows above header
  let driverName = '', driverId = '';
  for (let i = 0; i < headerIdx; i++) {
    const joined = rows[i].join(' ').trim();
    if (joined) { driverName = joined; }
  }

  const header = rows[headerIdx].map(h => String(h).trim().toLowerCase());
  const iDate  = header.findIndex(h => h.startsWith('date'));
  const iTalId = header.findIndex(h => /talabat.*id/.test(h));
  const iLate  = header.findIndex(h => /late.*login/.test(h));
  const iNoSh  = header.findIndex(h => /no.?show/.test(h));
  const iSusp  = header.findIndex(h => /suspension/.test(h));
  const iTime  = header.findIndex(h => h === 'time');
  const iBatch = header.findIndex(h => h === 'batch');
  const iOrds  = header.findIndex(h => /order/.test(h));
  const iHours = header.findIndex(h => /working.*hour|hour/i.test(h));

  const NON_WORK = /sick|no.?shift|family|suspend|emergency/i;

  const parsed = [];
  let prevDate = null;

  for (let i = headerIdx + 1; i < rows.length; i++) {
    const row  = rows[i];
    if (!row || row.every(c => !c)) continue;

    const timeVal = iTime >= 0 ? String(row[iTime] || '').trim() : '';
    const isNonWork = NON_WORK.test(timeVal);

    // Pick the candidate that keeps the sheet chronological:
    // smallest candidate that is >= previous row's date.
    const cands = parseDateCandidates(row[iDate] || '');
    let date = null;
    if (cands.length) {
      if (prevDate) {
        const valid = cands.filter(c => c >= prevDate);
        date = valid.length ? valid.reduce((a, b) => (a < b ? a : b)) : cands[0];
      } else {
        date = cands[0];
      }
    }
    if (date) prevDate = date;

    const batch  = iBatch  >= 0 ? parseInt(row[iBatch]  || '0') : 0;
    const orders = iOrds   >= 0 ? parseInt(row[iOrds]   || '0') : 0;
    const hours  = iHours  >= 0 ? parseHours(row[iHours]) : null;

    const talId    = iTalId >= 0 ? String(row[iTalId] || '').trim() : '';
    const lateVal  = iLate  >= 0 ? String(row[iLate]  || '').trim() : '';
    const noShowVal = iNoSh >= 0 ? String(row[iNoSh]  || '').trim() : '';
    const suspVal  = iSusp  >= 0 ? String(row[iSusp]  || '').trim() : '';

    parsed.push({ date, batch, orders, hours, isNonWork, timeVal, talId, lateVal, noShowVal, suspVal });
  }

  // ID type: Talabat Id column of the most recent working row wins;
  // fall back to the header name. Tri-state: 'fake' | 'real' | null (unknown).
  let idSource = driverName;
  for (let i = parsed.length - 1; i >= 0; i--) {
    if (!parsed[i].isNonWork && parsed[i].orders > 0 && parsed[i].talId) {
      idSource = parsed[i].talId; break;
    }
  }
  const idType = /fake/i.test(idSource) ? 'fake' : (/real/i.test(idSource) ? 'real' : null);

  return { name: driverName, rows: parsed, isFakeId: idType === 'fake', idType };
}

// ── LOAD ALL DATA ─────────────────────────────────────────────────────────────
async function loadAllData() {
  document.getElementById('lastUpdate').textContent = 'Updating...';
  try {
    allSheets = await fetchSheetNames();
    allData   = {};

    await Promise.all(allSheets.map(async name => {
      const raw   = await fetchSheet(name);
      allData[name] = parseDriverSheet(raw);
    }));

    document.getElementById('lastUpdate').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

    renderDaily();
    renderMonthly();
    renderDrivers();
    renderTrends();

  } catch (e) {
    document.getElementById('lastUpdate').textContent = 'Error';
    ['daily-content', 'monthly-content', 'drivers-content', 'trends-content'].forEach(id => {
      document.getElementById(id).innerHTML =
        `<div class="error-box">⚠ Could not load data: ${e.message}</div>`;
    });
  }
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function dateKey(d) {
  if (!d) return '';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isSameDay(a, b) {
  return a && b && a.getFullYear()===b.getFullYear() &&
         a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function getYesterday() {
  const d = new Date(); d.setDate(d.getDate() - 1); return d;
}

function getSelectedDay() {
  if (selectedDailyDate) {
    const [y, m, d] = selectedDailyDate.split('-').map(Number);
    return new Date(y, m - 1, d);
  }
  return getYesterday();
}

function selectDay(v) {
  selectedDailyDate = v || null;
  renderDaily();
}

function fmt3(n) {
  if (n == null || isNaN(n)) return '—';
  return n.toFixed(3);
}

function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  return n.toFixed(1) + '%';
}

function gradeColor(g) {
  return g==='A' ? 'green' : g==='B' ? 'blue' : g==='C' ? 'yellow' : 'red';
}

function gradeDriver(avgOrders) {
  if (avgOrders >= 18) return 'A';
  if (avgOrders >= 14) return 'B';
  if (avgOrders >= 10) return 'C';
  return 'D';
}

function currentBatch(driverRows) {
  const working = driverRows.filter(r => !r.isNonWork && r.orders > 0 && r.batch > 0);
  if (!working.length) return null;
  return working[working.length - 1].batch;
}

function cleanName(n) {
  return String(n || '').replace(/_?(FAKE|REAL)_?Id.*$/i, '').replace(/_+$/, '').trim();
}

function idBadge(t) {
  if (t === 'fake') return '<span class="badge badge-yellow" style="margin-left:6px">Fake ID</span>';
  if (t === 'real') return '<span class="badge badge-green" style="margin-left:6px">Real ID</span>';
  return '<span class="badge badge-gray" style="margin-left:6px">ID Unknown</span>';
}

// ID type AS OF a given date: the Talabat Id value of the latest row dated on
// or before refDate. Historical views must show the ID the driver actually
// held on that date, not his current one. Returns null (Unknown) if no row
// with a Talabat Id exists on or before refDate — never assumes.
// Batch AS OF a given date: batch of the latest working row on or before refDate.
function batchAsOf(driverRows, refDate) {
  for (let i = driverRows.length - 1; i >= 0; i--) {
    const r = driverRows[i];
    if (!r.isNonWork && r.orders > 0 && r.batch > 0 && r.date && r.date <= refDate) return r.batch;
  }
  return null;
}

// Discipline issues: count only EXPLICIT entries (Yes / نعم), never assume.
function isYes(v) { return /yes|نعم/i.test(String(v || '')); }

function issueCounts(rows, from, to) {
  let noShow = 0, late = 0, susp = 0;
  rows.forEach(r => {
    if (!r.date || r.date < from || r.date > to) return;
    if (isYes(r.noShowVal)) noShow++;
    if (isYes(r.lateVal)) late++;
    if (isYes(r.suspVal) || /suspend/i.test(r.timeVal || '')) susp++;
  });
  return { noShow, late, susp };
}

function topOffenderHTML(offenders, key, label, from, to) {
  const top = offenders.reduce((a, b) => (b[key] > a[key] ? b : a), { name: '', [key]: 0 });
  const val = top[key] > 0
    ? `<span style="color:var(--red);font-weight:600">${top.name} · ${top[key]}</span>`
    : '<span style="color:var(--text3)">None recorded</span>';
  return `<div class="rank-item">
    <div class="rank-num" style="color:var(--red)">⚠</div>
    <div class="rank-name">${label}</div>
    <div class="rank-value" style="font-family:'JetBrains Mono',monospace">${val}</div>
  </div>`;
}

function idTypeAsOf(driverRows, refDate) {
  let src = '';
  for (let i = driverRows.length - 1; i >= 0; i--) {
    const r = driverRows[i];
    if (r.talId && r.date && r.date <= refDate) { src = r.talId; break; }
  }
  if (!src) return null;
  return /fake/i.test(src) ? 'fake' : (/real/i.test(src) ? 'real' : null);
}

// ── RENDER DAILY ──────────────────────────────────────────────────────────────
function renderDaily() {
  const yesterday = getSelectedDay();   // selected day (default: yesterday)

  let totalOrders = 0, totalHours = 0;
  let activeCount = 0, absentCount = 0, suspendedCount = 0;
  let twelveHrOk  = 0, activeWithHours = 0;
  let batchDrivers = {};
  const absences   = [];
  const driverRows = [];

  const mtdStart = new Date(yesterday.getFullYear(), yesterday.getMonth(), 1);
  let mtdOrders  = 0, mtdHours = 0;
  let fakeCount  = 0;

  allSheets.forEach(name => {
    const driver = allData[name];
    if (!driver) return;
    if (idTypeAsOf(driver.rows, yesterday) === 'fake') fakeCount++;

    // Yesterday's row
    const yRow = driver.rows.find(r => isSameDay(r.date, yesterday));

    if (!yRow || yRow.isNonWork || yRow.orders === 0) {
      const reason = yRow ? yRow.timeVal : 'No row recorded';
      if (/suspend/i.test(reason)) suspendedCount++; else absentCount++;
      absences.push({ name: cleanName(driver.name || name), reason });
    } else {
      activeCount++;
      totalOrders += yRow.orders;
      if (yRow.hours != null) {
        totalHours  += yRow.hours;
        activeWithHours++;
        if (yRow.hours >= 12) twelveHrOk++;
      }

    }

    // Batch Breakdown: ALL drivers, batch AS OF the selected day
    const curB = batchAsOf(driver.rows, yesterday) || 0;
    if (curB > 0) {
      if (!batchDrivers[curB]) batchDrivers[curB] = [];
      batchDrivers[curB].push(cleanName(driver.name || name));
    }

    // MTD
    driver.rows.forEach(r => {
      if (!r.date || r.isNonWork) return;
      if (r.date >= mtdStart && r.date <= yesterday) {
        mtdOrders += r.orders || 0;
        if (r.hours) mtdHours += r.hours;
      }
    });

    // For driver table
    const topDriver = allData[name];
    const yR = topDriver.rows.find(r => isSameDay(r.date, yesterday));
    driverRows.push({
      name: cleanName(driver.name || name),
      idType: idTypeAsOf(driver.rows, yesterday),
      orders: yR && !yR.isNonWork ? yR.orders : 0,
      hours:  yR && !yR.isNonWork ? yR.hours  : null,
      batch:  yR && !yR.isNonWork && yR.batch > 0 ? yR.batch : (batchAsOf(driver.rows, yesterday) || '—'),
      active: yR && !yR.isNonWork && yR.orders > 0,
      reason: (!yR || yR.isNonWork) ? (yR ? yR.timeVal : 'No row') : ''
    });
  });

  const totalDrivers    = allSheets.length;
  const avgOrders       = activeCount ? totalOrders / activeCount : 0;
  const dailyUTR        = totalHours  ? totalOrders / totalHours  : null;
  const mtdUTR          = mtdHours    ? mtdOrders   / mtdHours    : null;
  const shiftPct        = activeWithHours ? (twelveHrOk / activeWithHours) * 100 : null;

  // Sort drivers by orders desc for top performer
  driverRows.sort((a,b) => b.orders - a.orders);

  // Build batch bars
  let batchHTML = '';
  [1,2,3,4,5,6,7].forEach(b => {
    const names = batchDrivers[b] || [];
    const pct   = totalDrivers ? (names.length / totalDrivers) * 100 : 0;
    batchHTML += `
      <div class="batch-row">
        <div class="batch-label">Batch ${b}</div>
        <div class="batch-bar-wrap"><div class="batch-bar-fill" style="width:${pct}%"></div></div>
        <div class="batch-count">${names.length}</div>
        <div class="batch-names">${names.join(', ') || '—'}</div>
      </div>`;
  });

  // Absences
  let absHTML = absences.length
    ? absences.map(a => `
        <div class="absence-item">
          <div class="absence-dot"></div>
          <div class="absence-name">${a.name}</div>
          <div class="absence-reason">${a.reason || 'No row recorded'}</div>
        </div>`).join('')
    : '<div style="color:var(--text3);font-size:12px;padding:8px 0">All drivers present ✓</div>';

  // Driver rows table
  let drTableHTML = driverRows.map((d,i) => {
    const grade = d.active ? gradeDriver(d.orders) : 'D';
    const low     = d.active && d.hours != null && d.hours < 12;
    const veryLow = d.active && d.hours != null && d.hours < 8;
    const nameStyle  = low ? `font-weight:700;${veryLow ? 'color:var(--red);' : ''}` : '';
    const hoursStyle = low ? `font-weight:700;color:var(${veryLow ? '--red' : '--yellow'});` : '';
    return `<tr>
      <td class="mono" style="color:var(--text3)">${i+1}</td>
      <td class="driver-name" style="${nameStyle}">${d.name} ${idBadge(d.idType)}</td>
      <td class="mono">${d.active ? d.orders : '—'}</td>
      <td class="mono" style="${hoursStyle}">${d.hours != null ? fmt3(d.hours) : '—'}</td>
      <td>${d.batch > 0 ? `<span class="badge badge-blue">B${d.batch}</span>` : '—'}</td>
      <td><span class="badge badge-${gradeColor(grade)}">${grade}</span></td>
      <td style="color:${d.active ? 'var(--green)':'var(--red)'}">
        ${d.active ? '✓ Active' : (d.reason || 'Absent')}
      </td>
    </tr>`;
  }).join('');

  document.getElementById('daily-content').innerHTML = `
    <div class="section-header">
      <div class="section-label">Performance Date: ${yesterday.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'})}</div>
      <input type="date" value="${dateKey(yesterday)}" onchange="selectDay(this.value)"
        style="background:var(--surface2);border:1px solid var(--border);color:var(--text);
               border-radius:5px;padding:4px 8px;font-family:'Inter',sans-serif;font-size:11px;color-scheme:dark;">
      <div class="section-line"></div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Total Drivers</div>
        <div class="kpi-value">${totalDrivers}</div>
        <div class="kpi-sub">Registered on Talabat</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Active Today</div>
        <div class="kpi-value ${activeCount === totalDrivers ? 'green' : 'yellow'}">${activeCount}</div>
        <div class="kpi-sub">Present on duty</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Absences</div>
        <div class="kpi-value ${absentCount === 0 ? 'green' : 'red'}">${absentCount}</div>
        <div class="kpi-sub">No-show / Sick / No row</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Suspensions</div>
        <div class="kpi-value ${suspendedCount === 0 ? 'green' : 'red'}">${suspendedCount}</div>
        <div class="kpi-sub">Suspended by Talabat</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">12-Hr Shift Rate</div>
        <div class="kpi-value ${shiftPct >= 90 ? 'green' : shiftPct >= 70 ? 'yellow' : 'red'}">${fmtPct(shiftPct)}</div>
        <div class="kpi-sub">${twelveHrOk} of ${activeWithHours} drivers</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Daily Orders</div>
        <div class="kpi-value accent">${totalOrders}</div>
        <div class="kpi-sub">Completed yesterday</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">MTD Orders</div>
        <div class="kpi-value blue">${mtdOrders}</div>
        <div class="kpi-sub">Month to date</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Avg Orders/Driver</div>
        <div class="kpi-value">${fmt3(avgOrders)}</div>
        <div class="kpi-sub">Per active driver</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Daily UTR</div>
        <div class="kpi-value ${dailyUTR >= 1.2 ? 'green' : dailyUTR >= 0.9 ? 'yellow' : 'red'}">${fmt3(dailyUTR)}</div>
        <div class="kpi-sub">Orders per hour</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">MTD UTR</div>
        <div class="kpi-value">${fmt3(mtdUTR)}</div>
        <div class="kpi-sub">Month to date</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Fake ID</div>
        <div class="kpi-value ${fakeCount === 0 ? 'green' : 'yellow'}">${fakeCount}</div>
        <div class="kpi-sub">of ${totalDrivers} drivers</div>
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-header">Batch Breakdown <span style="color:var(--text3);font-size:10px">drivers per batch</span></div>
        <div class="card-body">${batchHTML}</div>
      </div>
      <div class="card">
        <div class="card-header">Absences & Suspensions</div>
        <div class="card-body">${absHTML}</div>
      </div>
    </div>

    <div class="section-header" style="margin-top:16px">
      <div class="section-label">Driver Performance — Yesterday</div>
      <div class="section-line"></div>
    </div>
    <div class="card">
      <table class="driver-table">
        <thead>
          <tr>
            <th>#</th><th>Driver</th><th>Orders</th><th>Hours</th>

        <tbody>${drTableHTML}</tbody>
      </table>

  `;
}

// ── RENDER MONTHLY ────────────────────────────────────────────────────────────
function renderMonthly() {
  // Collect available months
  const monthSet = new Set();
  allSheets.forEach(name => {
    (allData[name]?.rows || []).forEach(r => {
      if (r.date) monthSet.add(`${r.date.getFullYear()}-${String(r.date.getMonth()+1).padStart(2,'0')}`);
    });
  });

  const months = Array.from(monthSet).sort();
  if (!selectedMonth || !months.includes(selectedMonth)) {
    selectedMonth = months[months.length - 1] || null;
  }

  const monthBtns = months.map(m => {
    const [y, mo] = m.split('-');
    const label = new Date(+y, +mo-1, 1).toLocaleDateString('en-GB', {month:'short', year:'numeric'});
    return `<button class="month-btn ${m===selectedMonth?'active':''}" onclick="selectMonth('${m}')">${label}</button>`;
  }).join('');

  if (!selectedMonth) {
    document.getElementById('monthly-content').innerHTML = '<div class="loading">No monthly data found.</div>';
    return;
  }

  const [selY, selMo] = selectedMonth.split('-').map(Number);
  const monthStart = new Date(selY, selMo-1, 1);
  const monthEnd   = new Date(selY, selMo, 0);

  // Per-driver stats for selected month
  const stats = allSheets.map(name => {
    const driver = allData[name];
    const rows   = (driver?.rows || []).filter(r =>
      r.date && r.date >= monthStart && r.date <= monthEnd && !r.isNonWork
    );
    const orders   = rows.reduce((s,r) => s + (r.orders||0), 0);
    const hours    = rows.reduce((s,r) => s + (r.hours||0), 0);
    const days     = new Set(rows.map(r => dateKey(r.date))).size;
    const utr      = hours > 0 ? orders / hours : null;
    const avgDaily = days  > 0 ? orders / days  : 0;
    const grade    = gradeDriver(avgDaily);
    const batch    = batchAsOf(driver?.rows || [], monthEnd);
    return { name: cleanName(driver?.name || name), idType: idTypeAsOf(driver?.rows || [], monthEnd), orders, hours, days, utr, avgDaily, grade, batch };
  });

  stats.sort((a,b) => b.orders - a.orders);

  // Rankings
  const topOrders  = [...stats].sort((a,b) => b.orders-a.orders)[0];
  const topHours   = [...stats].sort((a,b) => b.hours -a.hours )[0];
  const topUTR     = [...stats].filter(s => s.days >= 10).sort((a,b) => (b.utr||0)-(a.utr||0))[0];
  const weakest    = [...stats].sort((a,b) => a.orders-b.orders)[0];

  // 10-day periods
  const p1End = new Date(selY, selMo-1, 10);
  const p2End = new Date(selY, selMo-1, 20);

  function periodOrders(from, to) {
    let total = 0;
    allSheets.forEach(name => {
      (allData[name]?.rows||[]).forEach(r => {
        if (r.date && r.date >= from && r.date <= to && !r.isNonWork) total += r.orders||0;
      });
    });
    return total;
  }

  const p1Ords = periodOrders(monthStart, p1End);
  const p2Ords = periodOrders(new Date(selY,selMo-1,11), p2End);
  const p3Ords = periodOrders(new Date(selY,selMo-1,21), monthEnd);
  const totalM = p1Ords + p2Ords + p3Ords;

  function pctOf(n) { return totalM ? ((n/totalM)*100).toFixed(1)+'%' : '—'; }

  const offenders = allSheets.map(name => {
    const d = allData[name];
    const cnt = issueCounts(d?.rows || [], monthStart, monthEnd);
    return { name: cleanName(d?.name || name), ...cnt };
  });

  const tableHTML = stats.map((s,i) => `
    <tr>
      <td class="mono" style="color:var(--text3)">${i+1}</td>
      <td class="driver-name">${s.name} ${idBadge(s.idType)}</td>

// ── TRENDS TAB ────────────────────────────────────────────────────────────────
let trendsAgg   = '10day';        // 'weekly' | '10day' | 'monthly'
let trendsDriver = null;          // sheet name of selected driver
let trendCharts = {};             // canvasId -> Chart instance

function bucketKey(d, agg) {
  const y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
  if (agg === 'monthly') return `${y}-${String(m+1).padStart(2,'0')}`;
  if (agg === '10day') {
    const p = day <= 10 ? 1 : day <= 20 ? 2 : 3;
    return `${y}-${String(m+1).padStart(2,'0')}-P${p}`;
  }
  // weekly: Monday of the week
  const t = new Date(y, m, day);
  const dow = (t.getDay() + 6) % 7;   // Mon=0
  t.setDate(t.getDate() - dow);
  return dateKey(t);
}

const MONTHS_SH = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function bucketLabel(key, agg) {
  if (agg === 'monthly') {
    const [y, m] = key.split('-');
    return `${MONTHS_SH[+m-1]} ${y}`;
  }
  if (agg === '10day') {
    const [y, m, p] = key.split('-');
    const rng = p === 'P1' ? '1–10' : p === 'P2' ? '11–20' : '21–end';
    return `${MONTHS_SH[+m-1]} ${rng}`;
  }
  const [y, m, d] = key.split('-');
  return `Wk ${+d} ${MONTHS_SH[+m-1]}`;
}

// Aggregate rows (already-parsed working rows) into ordered buckets.
// Returns { keys, labels, orders[], hours[], utr[], activeDays[] }
function aggregateRows(rowsList, agg) {
  const buckets = {};   // key -> {orders, hours, days:Set-like count}
  rowsList.forEach(r => {
    if (!r.date || r.isNonWork || !(r.orders > 0)) return;
    const k = bucketKey(r.date, agg);
    if (!buckets[k]) buckets[k] = { orders: 0, hours: 0, days: 0 };
    buckets[k].orders += r.orders;
    if (r.hours != null) buckets[k].hours += r.hours;
    buckets[k].days += 1;
  });
  const keys = Object.keys(buckets).sort();
  return {
    keys,
    labels: keys.map(k => bucketLabel(k, agg)),
    orders: keys.map(k => buckets[k].orders),
    hours:  keys.map(k => +buckets[k].hours.toFixed(3)),
    utr:    keys.map(k => buckets[k].hours > 0 ? +(buckets[k].orders / buckets[k].hours).toFixed(3) : null),
    days:   keys.map(k => buckets[k].days)
  };
}

function destroyChart(id) {
  if (trendCharts[id]) { trendCharts[id].destroy(); delete trendCharts[id]; }
}

function drawTrendChart(id, labels, datasets, yTitle) {
  destroyChart(id);
  const el = document.getElementById(id);
  if (!el) return;
  trendCharts[id] = new Chart(el.getContext('2d'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#9ca3af', boxWidth: 12, font: { size: 11 } } },
        tooltip: { callbacks: {} }
      },
      scales: {
        x: { ticks: { color: '#9ca3af', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { title: { display: !!yTitle, text: yTitle || '', color: '#9ca3af' },
             ticks: { color: '#9ca3af', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.06)' },
             beginAtZero: true }
      }
    }
  });
}

function setTrendsAgg(agg, el) {
  trendsAgg = agg;

      <span>

        <button class="trends-agg-btn month-btn ${trendsAgg==='10day'?'active':''}"   onclick="setTrendsAgg('10day', this)">10-Day</button>
        <button class="trends-agg-btn month-btn ${trendsAgg==='monthly'?'active':''}" onclick="setTrendsAgg('monthly', this)">Monthly</button>
      </span>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><div class="card-title">Company — Overall Trend</div></div>
      <div style="padding:16px">

          ${opts}

      <div style="padding:16px">
        <div style="height:260px"><canvas id="chart-dr-orders"></canvas></div>
        <div style="height:220px;margin-top:18px"><canvas id="chart-dr-utr"></canvas></div>
        <div style="height:220px;margin-top:18px"><canvas id="chart-dr-hours"></canvas></div>
      </div>
    </div>`;

  renderTrendsCharts();

function renderTrendsCharts() {
  if (typeof Chart === 'undefined') {
    document.getElementById('trends-content').innerHTML =
      '<div class="error-box">⚠ Chart library failed to load. Check internet connection and refresh.</div>';
    return;
  }
  // Company: all rows of all drivers combined
  const companyRows = [];
  Object.values(allData).forEach(d => { if (d && d.rows) companyRows.push(...d.rows); });
  const co = aggregateRows(companyRows, trendsAgg);

  const C_ORD = '#f59e0b', C_UTR = '#3b82f6', C_HRS = '#10b981';

  drawTrendChart('chart-co-orders', co.labels,
    [{ label: 'Orders', data: co.orders, borderColor: C_ORD, backgroundColor: C_ORD+'33', tension: .3, fill: true }],
    'Orders');
  drawTrendChart('chart-co-utr', co.labels,
    [{ label: 'UTR (orders/hour)', data: co.utr, borderColor: C_UTR, backgroundColor: C_UTR+'33', tension: .3, spanGaps: true }],
    'UTR');
  drawTrendChart('chart-co-hours', co.labels,
    [{ label: 'Working Hours', data: co.hours, borderColor: C_HRS, backgroundColor: C_HRS+'33', tension: .3 }],
    'Hours');

  // Driver
  const d = trendsDriver ? allData[trendsDriver] : null;
  const dr = aggregateRows(d && d.rows ? d.rows : [], trendsAgg);
  drawTrendChart('chart-dr-orders', dr.labels,
    [{ label: 'Orders', data: dr.orders, borderColor: C_ORD, backgroundColor: C_ORD+'33', tension: .3, fill: true }],
    'Orders');
  drawTrendChart('chart-dr-utr', dr.labels,
    [{ label: 'UTR (orders/hour)', data: dr.utr, borderColor: C_UTR, backgroundColor: C_UTR+'33', tension: .3, spanGaps: true }],
    'UTR');
  drawTrendChart('chart-dr-hours', dr.labels,
    [{ label: 'Working Hours', data: dr.hours, borderColor: C_HRS, backgroundColor: C_HRS+'33', tension: .3 }],
    'Hours');
}
